      <stop offset="58%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111c32"/>
    </linearGradient>

    <linearGradient id="tcEdge" x1="0" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
