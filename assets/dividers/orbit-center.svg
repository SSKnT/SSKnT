<svg width="860" height="96" viewBox="0 0 860 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cosmic section divider center">
  <defs>
    <linearGradient id="oc" x1="0" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="30%" stop-color="#38bdf8" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#e2e8f0" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="860" height="96" fill="#0f172a" opacity="0.001"/>
  <line x1="40" y1="48" x2="820" y2="48" stroke="url(#oc)" stroke-width="2.2" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.92;0.6" dur="10s" repeatCount="indefinite"/>
  </line>
  <circle cx="430" cy="48" r="4.4" fill="#93c5fd">
    <animate attributeName="r" values="3.8;6;3.8" dur="4.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="430" cy="48" r="12" fill="none" stroke="#93c5fd" stroke-opacity="0.38">
    <animate attributeName="r" values="10;17;10" dur="9s" repeatCount="indefinite"/>
  </circle>
</svg>
