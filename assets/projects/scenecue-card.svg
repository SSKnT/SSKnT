<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SceneCue project card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="720" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
  <rect width="720" height="420" rx="24" fill="url(#bg)" />
  <rect x="36" y="34" width="648" height="352" rx="18" fill="#111827" stroke="#1e293b" />
  <text x="68" y="104" fill="#e2e8f0" font-family="Segoe UI, Ubuntu, sans-serif" font-size="44" font-weight="700">SceneCue</text>
  <text x="68" y="144" fill="#93c5fd" font-family="Segoe UI, Ubuntu, sans-serif" font-size="20">AI Browser Extension</text>
  <text x="68" y="208" fill="#cbd5e1" font-family="Segoe UI, Ubuntu, sans-serif" font-size="18">Skip sensitive scenes with precise timeline intelligence.</text>
  <text x="68" y="238" fill="#94a3b8" font-family="Segoe UI, Ubuntu, sans-serif" font-size="16">Real-time media detection • Crowdsourced moderation</text>
  <rect x="68" y="286" width="184" height="42" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45" />
  <text x="92" y="313" fill="#38bdf8" font-family="Segoe UI, Ubuntu, sans-serif" font-size="17">Chrome + Python API</text>
  <line x1="68" y1="172" x2="652" y2="172" stroke="url(#line)" stroke-width="2" opacity="0.7">
