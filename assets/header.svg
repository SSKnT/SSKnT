<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sohaib Shaukat cosmic header">
  <defs>
    <linearGradient id="spaceBg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1120" />
      <stop offset="55%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.45" />
      <stop offset="65%" stop-color="#6366f1" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="titleGradient" x1="280" y1="0" x2="1040" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <filter id="textGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#spaceBg)" rx="18" />
  <ellipse cx="990" cy="88" rx="210" ry="130" fill="url(#planetGlow)">
    <animate attributeName="cx" values="980;1005;980" dur="20s" repeatCount="indefinite" />
  </ellipse>

  <g opacity="0.85">
    <circle cx="90" cy="54" r="1.2" fill="#93c5fd" />
    <circle cx="180" cy="88" r="0.9" fill="#38bdf8" />
    <circle cx="260" cy="48" r="1.1" fill="#c4b5fd" />
    <circle cx="370" cy="76" r="0.8" fill="#e2e8f0" />
    <circle cx="472" cy="52" r="1.2" fill="#93c5fd" />
    <circle cx="560" cy="86" r="0.8" fill="#c4b5fd" />
    <circle cx="680" cy="46" r="1.2" fill="#38bdf8" />
    <circle cx="790" cy="84" r="0.9" fill="#e2e8f0" />
    <circle cx="902" cy="50" r="1.2" fill="#93c5fd" />
    <circle cx="1016" cy="82" r="0.8" fill="#c4b5fd" />
    <circle cx="1120" cy="52" r="1.1" fill="#38bdf8" />
    <circle cx="1218" cy="90" r="0.9" fill="#e2e8f0" />
    <animateTransform attributeName="transform" type="translate" values="0 0;-24 0;0 0" dur="34s" repeatCount="indefinite" />
  </g>

  <g opacity="0.5">
    <circle cx="120" cy="236" r="1.4" fill="#38bdf8" />
    <circle cx="242" cy="256" r="1.0" fill="#93c5fd" />
    <circle cx="390" cy="224" r="1.2" fill="#c4b5fd" />
    <circle cx="536" cy="262" r="0.9" fill="#e2e8f0" />
    <circle cx="684" cy="230" r="1.3" fill="#93c5fd" />
    <circle cx="826" cy="258" r="1.0" fill="#c4b5fd" />
    <circle cx="982" cy="228" r="1.2" fill="#38bdf8" />
    <circle cx="1138" cy="252" r="0.9" fill="#e2e8f0" />
    <animateTransform attributeName="transform" type="translate" values="0 0;18 0;0 0" dur="26s" repeatCount="indefinite" />
  </g>

  <text x="640" y="168" text-anchor="middle" fill="url(#titleGradient)" font-family="Segoe UI, Ubuntu, sans-serif" font-size="54" font-weight="700" letter-spacing="1.8" filter="url(#textGlow)">
    Sohaib Shaukat
    <animate attributeName="opacity" values="0.88;1;0.88" dur="7s" repeatCount="indefinite" />
  </text>

  <text x="640" y="206" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Ubuntu, sans-serif" font-size="17" letter-spacing="2.1" opacity="0.9">
    FULL-STACK SAAS ENGINEER
  </text>

  <line x1="430" y1="224" x2="850" y2="224" stroke="#38bdf8" stroke-opacity="0.45" stroke-width="1.4">
    <animate attributeName="stroke-opacity" values="0.25;0.7;0.25" dur="8s" repeatCount="indefinite" />
  </line>
</svg>
