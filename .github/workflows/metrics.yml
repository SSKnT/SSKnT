name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir -p build

      # 🔹 Base Metrics
      - name: Base metrics panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: SSKnT
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_skipped: SSKnT/SSKnT
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_history_limit: 1
          config_timezone: Asia/Karachi
          filename: build/metrics.base.svg
          output_action: local

      # 🔹 Languages Metrics
      - name: Language metrics panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: SSKnT
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 10
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming, markup
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          config_timezone: Asia/Karachi
          filename: build/metrics.languages.svg
          output_action: local

      # Achievements panel disabled due to intermittent upstream rendering errors
      # that can produce an "Unexpected error" SVG in profile output.

      # 🔹 Deploy to output branch (modern + reliable)
      - name: Push metrics SVGs to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: output-metrics