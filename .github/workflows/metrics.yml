name: Generate Profile Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Base metrics panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SSKnT
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_lines_history_limit: 1
          config_timezone: Asia/Karachi
          filename: metrics.base.svg
          output_action: none

      - name: Language metrics panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SSKnT
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 10
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: programming
          plugin_languages_recent_categories: programming
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          plugin_languages_recent_days: 21
          config_timezone: Asia/Karachi
          filename: metrics.languages.svg
          output_action: none

      - name: Achievements panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: SSKnT
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_limit: 0
          config_timezone: Asia/Karachi
          filename: metrics.achievements.svg
          output_action: none

      - name: Push metrics SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-metrics
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
