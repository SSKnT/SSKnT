name: Generate Snake Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate neon snake assets
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/ocean.gif?color_snake=ff2e88&color_dots=%230b0f1a,%23103f4a,%2300f5ff,%2339ff14,%23ff2e88
            dist/ocean.svg?color_snake=ff2e88&color_dots=%230b0f1a,%23103f4a,%2300f5ff,%2339ff14,%23ff2e88

      - name: Push snake assets to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-snake
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
